{% load static %}
{# Help-Chat Widget — auf jeder Seite per {% include %} einbinden #}

<link rel="stylesheet" href="{% static 'piquano_core/css/help_chat.css' %}">

<div id="pq-help-chat">
  <button id="pq-help-btn" type="button" title="Hilfe" aria-label="Hilfe öffnen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </button>

  <div id="pq-help-panel" class="pq-help-hidden">
    <div class="pq-help-header">
      <span>Hilfe</span>
      <button id="pq-help-close" type="button" aria-label="Schließen">&times;</button>
    </div>
    <div id="pq-help-body">
      <p class="pq-help-intro">Frag mich, wie eine Funktion auf dieser Seite funktioniert.</p>
    </div>
    <div class="pq-help-input-row">
      <input id="pq-help-input" type="text" placeholder="Deine Frage..." autocomplete="off">
      <button id="pq-help-send" type="button" aria-label="Frage senden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="{% static 'piquano_core/js/help_chat.js' %}"></script>
