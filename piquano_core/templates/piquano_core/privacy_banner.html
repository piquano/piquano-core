{% if show_privacy_banner %}
<div id="privacy-blocker" style="position:fixed; inset:0; z-index:99999; background:rgba(19,52,71,0.97); display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:#fff; border-radius:8px; max-width:900px; width:95%; max-height:90vh; display:flex; flex-direction:column; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; overflow:hidden;">
        <div style="padding:24px 32px 16px; border-bottom:1px solid #e2e8f0; flex-shrink:0;">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                <div style="width:40px; height:40px; background:#e8f0fe; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                    <svg style="width:20px; height:20px; color:#328cc1;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                </div>
                <h2 style="margin:0; font-size:1.15rem; color:#133447;">Aktualisierte Datenschutzerkl&auml;rung (Version {{ current_dse_version }})</h2>
            </div>
            <p style="margin:0; font-size:13px; color:#64748b;">Bitte lies die Datenschutzerkl&auml;rung und best&auml;tige die Kenntnisnahme, um fortzufahren.</p>
        </div>
        <div style="flex:1; overflow-y:auto; padding:24px 32px; font-size:14px; color:#1e293b; line-height:1.7;">
            {% include "piquano_core/datenschutz_content.html" %}
        </div>
        <div style="padding:16px 32px; border-top:1px solid #e2e8f0; flex-shrink:0; background:#f8fafc;">
            <form method="post" action="{% url 'pq_privacy:acknowledge' %}" style="margin:0;">
                {% csrf_token %}
                <button type="submit" style="width:100%; padding:12px; background:#328cc1; color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer;">
                    Zur Kenntnis genommen
                </button>
            </form>
        </div>
    </div>
</div>
<script>
(function(){
    var blocker = document.getElementById('privacy-blocker');
    if (!blocker) return;
    document.addEventListener('keydown', function(e) {
        if (!blocker.contains(e.target)) { e.preventDefault(); e.stopPropagation(); }
    }, true);
    document.addEventListener('click', function(e) {
        if (!blocker.contains(e.target)) { e.preventDefault(); e.stopPropagation(); }
    }, true);
    document.querySelectorAll('.sidebar, .topbar, .main-content, .content-wrapper, [class*="sidebar"], [class*="topbar"], nav').forEach(function(el) {
        if (!blocker.contains(el)) { el.style.pointerEvents = 'none'; el.setAttribute('aria-hidden', 'true'); }
    });
})();
</script>
{% endif %}
