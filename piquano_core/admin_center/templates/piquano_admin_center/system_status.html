{% extends "base.html" %}
{% block title %}System-Status -- Admin-Center{% endblock %}

{% block content %}
<div class="page-header" style="display:flex; align-items:center; justify-content:space-between;">
    <h1>System-Status</h1>
    <a href="{% url 'piquano_admin_center:dashboard' %}" class="btn btn-secondary">Zurueck</a>
</div>

<div class="card" style="margin-bottom:24px;">
    <div class="card-body" style="padding:0;">
        <iframe src="{{ grafana_embed_url }}"
                style="width:100%; height:800px; border:none; border-radius:8px;"
                loading="lazy"></iframe>
    </div>
</div>

<div class="card">
    <div class="card-header"><h2>Direktlinks</h2></div>
    <div class="card-body">
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <a href="{{ grafana_embed_url|cut:'&kiosk' }}" target="_blank" class="btn btn-primary">Grafana oeffnen</a>
            <a href="{% url 'piquano_admin_center:docs_admin' %}" class="btn btn-secondary">Admin-Handbuch</a>
            <a href="{% url 'piquano_admin_center:docs_tom' %}" class="btn btn-secondary">TOM (Art. 32)</a>
            <a href="{% url 'piquano_admin_center:docs_vvt' %}" class="btn btn-secondary">VVT (Art. 30)</a>
        </div>
    </div>
</div>
{% endblock %}
